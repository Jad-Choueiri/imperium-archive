<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="view-transition" content="same-origin">
  <title>Imperium Archive — The Bibliotheca</title>
  <meta name="description" content="Search modern publications and ancient translations about Rome.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="navbar-mount"></div>

  <header class="hero">
    <h1>The Bibliotheca</h1>
    <p>Search the wider world's writing on Rome — histories, translations, and modern scholarship — pulled live from the Google Books API.</p>
  </header>

  <main class="section">
    <form id="search-form" class="search-bar">
      <div class="input-group mb-2">
        <input type="search" id="search-input" class="form-control" placeholder="Search e.g. &quot;Punic Wars&quot; or &quot;Nero&quot;" aria-label="Search books about Rome" required>
        <button class="btn btn-imperium" type="submit">Search</button>
      </div>
      <select id="format-filter" class="form-select" aria-label="Filter results by format">
        <option value="all">Show All Results</option>
        <option value="ebooks">Show Only Free eBooks</option>
      </select>
    </form>

    <div class="text-center mb-4">
      <a href="#video-results" class="jump-link">Jump straight to videos &darr;</a>
    </div>

    <div id="search-status" role="status" aria-live="polite"></div>
    <div class="row g-4" id="book-results"></div>
    <div class="section-title" style="margin-top: 3rem;">
      <span class="kicker">Watch &amp; Learn</span>
      <h2>Video Footage</h2>
    </div>
    <div id="video-status" role="status" aria-live="polite"></div>
    <div class="row g-4" id="video-results"></div>
  </main>

  <footer>
    IMPERIUM ARCHIVE &middot; A Roman History Archive
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/search.js"></script>
</body>
</html>
